experiment_name: local-rtx3060-20k-live
seed: 11

data:
  provider: osv5m
  provider_root: data/osv5m
  train_manifest: data/osv5m/manifests/train.parquet
  val_manifest: null
  image_root: data/osv5m/raw
  val_fraction: 0.1
  require_archive_rows: true
  coarse_bins:
    - 18
    - 36
  fine_bins:
    - 72
    - 144
  max_train_rows: 18000
  max_val_rows: 512

download:
  backend: snapshot
  osv5m_metadata_base: https://huggingface.co/datasets/osv5m/osv5m/resolve/main
  osv5m_tree_base: https://huggingface.co/datasets/osv5m/osv5m/tree/main
  geograph_sample_url: https://s3.eu-west-1.amazonaws.com/data.geograph.org.uk/datasets/geograph_dataset001-sample.zip
  chunk_size_mb: 16
  extract_archives: false
  cleanup_archives: false
  snapshot_max_workers: 16
  index_archives: true
  index_max_workers: 8

model:
  backbone: conv_geo_tiny
  fallback_backbone: conv_geo_tiny
  pretrained: false
  image_size: 160
  embedding_dim: 192
  hidden_dim: 256
  dropout: 0.08
  num_experts: 3
  posterior_components: 6
  retrieval_temperature: 0.08
  auxiliary_categorical_heads: []
  auxiliary_numeric_heads: []

train:
  epochs: 6
  batch_size: 32
  val_batch_size: 32
  learning_rate: 0.0008
  weight_decay: 0.0001
  accumulate_steps: 1
  grad_clip_norm: 1.0
  num_workers: 1
  prefetch_factor: 2
  drop_last: true
  use_streaming_train_dataset: true
  shuffle_buffer_size: 1024
  shuffle_archives: true
  worker_sharding_mode: auto
  checkpoint_every_images: 5000
  eval_every_images: 5000
  amp: fp16
  compile: false
  compile_mode: reduce-overhead
  channels_last: true
  pin_memory: true
  fused_optimizer: true
  allow_tf32: true
  cudnn_benchmark: true
  matmul_precision: high
  log_every_steps: 10
  console_log: true
  console_log_every_steps: 10
  checkpoint_dir: runs/checkpoints
  metrics_dir: runs/metrics
  label_smoothing: 0.03
  coarse_loss_weight: 0.35
  fine_loss_weight: 0.85
  retrieval_loss_weight: 0.35
  regression_loss_weight: 0.55
  distribution_loss_weight: 0.4
  clue_loss_weight: 0.0

eval:
  thresholds_km:
    - 1
    - 5
    - 25
    - 100
    - 750
    - 2500
  retrieval_top_k: 4
  retrieval_blend: 0.6
  retrieval_filter_coarse_top_k: 3
  use_gallery_rerank: false
  max_gallery_items: 4096
  candidate_top_k: 8
  candidate_retrieval_weight: 0.35
  clue_rerank_weight: 0.0

runtime:
  device: cuda
  deterministic: false
