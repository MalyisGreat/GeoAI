experiment_name: atlasmoe-a100-runpod-1epoch
seed: 42

data:
  provider: osv5m
  provider_root: data/osv5m
  train_manifest: data/osv5m/manifests/train.parquet
  val_manifest: null
  image_root: data/osv5m/raw
  val_fraction: 0.02
  coarse_bins:
    - 18
    - 36
  fine_bins:
    - 72
    - 144
  max_train_rows: null
  max_val_rows: 25000

download:
  backend: snapshot
  osv5m_metadata_base: https://huggingface.co/datasets/osv5m/osv5m/resolve/main
  osv5m_tree_base: https://huggingface.co/datasets/osv5m/osv5m/tree/main
  geograph_sample_url: https://s3.eu-west-1.amazonaws.com/data.geograph.org.uk/datasets/geograph_dataset001-sample.zip
  chunk_size_mb: 32
  extract_archives: false
  cleanup_archives: false
  snapshot_max_workers: 48
  index_archives: true
  index_max_workers: 32

model:
  backbone: timm:vit_large_patch14_dinov2.lvd142m
  fallback_backbone: conv_geo_large
  pretrained: true
  image_size: 224
  embedding_dim: 1024
  hidden_dim: 1536
  dropout: 0.1
  num_experts: 8
  posterior_components: 16
  retrieval_temperature: 0.05
  auxiliary_categorical_heads:
    - land_cover
    - climate
    - soil
    - drive_side
  auxiliary_numeric_heads:
    - road_index
    - dist_sea

train:
  epochs: 1
  batch_size: 128
  val_batch_size: 192
  learning_rate: 0.00015
  weight_decay: 0.0001
  accumulate_steps: 1
  grad_clip_norm: 1.0
  num_workers: 16
  prefetch_factor: 4
  drop_last: true
  use_streaming_train_dataset: true
  shuffle_buffer_size: 8192
  shuffle_archives: true
  worker_sharding_mode: auto
  checkpoint_every_images: 300000
  eval_every_images: 0
  amp: bf16
  compile: false
  compile_mode: reduce-overhead
  channels_last: true
  pin_memory: true
  fused_optimizer: true
  allow_tf32: true
  cudnn_benchmark: true
  matmul_precision: high
  log_every_steps: 100
  console_log: true
  console_log_every_images: 30000
  checkpoint_dir: runs/checkpoints
  metrics_dir: runs/metrics
  label_smoothing: 0.05
  coarse_loss_weight: 0.35
  fine_loss_weight: 0.9
  retrieval_loss_weight: 0.4
  regression_loss_weight: 0.65
  distribution_loss_weight: 0.5
  clue_loss_weight: 0.3

eval:
  thresholds_km:
    - 1
    - 5
    - 25
    - 100
    - 750
    - 2500
  retrieval_top_k: 8
  retrieval_blend: 0.6
  retrieval_filter_coarse_top_k: 3
  use_gallery_rerank: false
  max_gallery_items: 25000
  candidate_top_k: 16
  candidate_retrieval_weight: 0.35
  clue_rerank_weight: 0.2

runtime:
  device: auto
  deterministic: false
