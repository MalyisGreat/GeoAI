experiment_name: geo-superhuman-a100
seed: 42

data:
  provider: osv5m
  provider_root: data/osv5m
  train_manifest: data/osv5m/manifests/train.parquet
  val_manifest: null
  image_root: data/osv5m/raw/images/train
  val_fraction: 0.1
  coarse_bins:
    - 18
    - 36
  fine_bins:
    - 72
    - 144
  max_train_rows: null
  max_val_rows: 50000

download:
  osv5m_metadata_base: https://huggingface.co/datasets/osv5m/osv5m/resolve/main
  osv5m_tree_base: https://huggingface.co/datasets/osv5m/osv5m/tree/main
  geograph_sample_url: https://s3.eu-west-1.amazonaws.com/data.geograph.org.uk/datasets/geograph_dataset001-sample.zip
  chunk_size_mb: 4
  extract_archives: true
  cleanup_archives: false

model:
  backbone: timm:vit_base_patch14_dinov2.lvd142m
  fallback_backbone: conv_geo_large
  pretrained: true
  image_size: 224
  embedding_dim: 512
  hidden_dim: 768
  dropout: 0.1

train:
  epochs: 8
  batch_size: 256
  val_batch_size: 512
  learning_rate: 0.0003
  weight_decay: 0.0001
  accumulate_steps: 1
  grad_clip_norm: 1.0
  num_workers: 8
  amp: bf16
  compile: true
  channels_last: true
  pin_memory: true
  log_every_steps: 20
  checkpoint_dir: runs/checkpoints
  metrics_dir: runs/metrics
  label_smoothing: 0.05
  coarse_loss_weight: 0.35
  fine_loss_weight: 0.9
  regression_loss_weight: 0.65

eval:
  thresholds_km:
    - 1
    - 5
    - 25
    - 100
    - 750
    - 2500
  retrieval_top_k: 8
  retrieval_blend: 0.65
  retrieval_filter_coarse_top_k: 3
  use_gallery_rerank: true

runtime:
  device: auto
  deterministic: false
