image_size: 224
backbone_family: convnext
backbone:
  timm_name: convnext_tiny
  pretrained: true
  drop_path_rate: 0.1
  train_backbone: true
  checkpoint_gradients: false
adapter:
  enabled: true
  bottleneck_dim: 256
  dropout: 0.1
  gate_init: 0.25
head:
  geocell_classes: 0
  hidden_dim: 384
  embedding_dim: 192
  dropout: 0.15
  predict_geocell: true
  predict_uncertainty: true
  decode_topk: 8
  max_offset_norm: 0.08
  decode_confidence_threshold: 0.08
  decode_confidence_sharpness: 18.0
loss:
  geocell_weight: 1.0
  geodesic_weight: 0.75
  embedding_weight: 0.05
  offset_weight: 0.15
  label_smoothing: 0.0
  contrastive_temperature: 0.07
  spatial_geocell_radius_km: 250.0
  spatial_geocell_topk: 16
export:
  example_image_size: 224
  dynamic_batch: true
