experiment_name: smoke-geograph
seed: 7

data:
  provider: geograph_sample
  provider_root: data/geograph_sample
  train_manifest: data/geograph_sample/manifests/geograph_sample.parquet
  val_manifest: null
  image_root: data/geograph_sample/raw
  val_fraction: 0.2
  coarse_bins:
    - 8
    - 16
  fine_bins:
    - 16
    - 32
  max_train_rows: 10
  max_val_rows: 10

download:
  geograph_sample_url: https://s3.eu-west-1.amazonaws.com/data.geograph.org.uk/datasets/geograph_dataset001-sample.zip
  chunk_size_mb: 2
  extract_archives: true
  cleanup_archives: false

model:
  backbone: conv_geo_tiny
  fallback_backbone: conv_geo_tiny
  pretrained: false
  image_size: 160
  embedding_dim: 128
  hidden_dim: 192
  dropout: 0.05
  num_experts: 2
  posterior_components: 4
  retrieval_temperature: 0.1
  auxiliary_categorical_heads: []
  auxiliary_numeric_heads: []

train:
  epochs: 3
  batch_size: 4
  val_batch_size: 4
  learning_rate: 0.001
  weight_decay: 0.0001
  accumulate_steps: 1
  grad_clip_norm: 1.0
  num_workers: 0
  prefetch_factor: 2
  drop_last: false
  amp: none
  compile: false
  compile_mode: reduce-overhead
  channels_last: false
  pin_memory: false
  fused_optimizer: false
  allow_tf32: false
  cudnn_benchmark: false
  matmul_precision: high
  log_every_steps: 1
  checkpoint_dir: runs/checkpoints
  metrics_dir: runs/metrics
  label_smoothing: 0.0
  coarse_loss_weight: 0.35
  fine_loss_weight: 0.9
  retrieval_loss_weight: 0.3
  regression_loss_weight: 0.65
  distribution_loss_weight: 0.35
  clue_loss_weight: 0.0

eval:
  thresholds_km:
    - 1
    - 5
    - 25
    - 100
    - 750
  retrieval_top_k: 3
  retrieval_blend: 0.55
  retrieval_filter_coarse_top_k: 2
  use_gallery_rerank: true
  candidate_top_k: 4
  candidate_retrieval_weight: 0.25
  clue_rerank_weight: 0.0

runtime:
  device: auto
  deterministic: true
